---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.26.10.100:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.26.10.100"
additionalMachineCertSans: *sans

clusterPodNets: ["10.69.0.0/16"]
clusterSvcNets: ["10.96.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k3s1"
    ipAddress: "10.26.10.101"
    installDiskSelector:
      serial: "25104EA4EFA3"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9fd81b5f1547a2d7031d500aac26d2b2cd6b65a8a45f0d6b7a3edc4614b1029a
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:7f:77:87"
        dhcp: false
        addresses:
          - "10.26.10.101/24"
        routes:
          - gateway: "10.26.10.1"
            network: 0.0.0.0/0
        mtu: 9000
        vip:
          ip: "10.26.10.100"
  - hostname: "k3s2"
    ipAddress: "10.26.10.102"
    installDiskSelector:
      serial: "22401G800392"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9fd81b5f1547a2d7031d500aac26d2b2cd6b65a8a45f0d6b7a3edc4614b1029a
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:e0:4c:68:08:d1"
        dhcp: false
        addresses:
          - "10.26.10.102/24"
        routes:
          - gateway: "10.26.10.1"
            network: 0.0.0.0/0
        mtu: 9000
        vip:
          ip: "10.26.10.100"
  - hostname: "k3s3"
    ipAddress: "10.26.10.103"
    installDiskSelector:
      serial: "S64ANS0T131578N"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/9fd81b5f1547a2d7031d500aac26d2b2cd6b65a8a45f0d6b7a3edc4614b1029a
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:e0:4c:68:09:43"
        dhcp: false
        addresses:
          - "10.26.10.103/24"
        routes:
          - gateway: "10.26.10.1"
            network: 0.0.0.0/0
        mtu: 9000
        vip:
          ip: "10.26.10.100"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

